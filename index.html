<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary Arms Search Assistant</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: #1f2937;
      color: white;
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    #chat-container {
      width: 100%;
      height: calc(100vh - 70px);
    }
  </style>
</head>

<body>

  <div class="header">
    PHS
  </div>

  <!-- Chat Container -->
  <div id="chat-container"></div>

  <!-- Kore.ai Widget Loader -->
  <script
    src="https://widget.kore.ai/v1/loader.js"
    data-app-id="aa-09fcd08b-7f23-4f62-9fdb-c880eb492e24"
    data-container="chat-container">
  </script>

  <script>
    window.onload = function () {

      KoreWidget.init({
        appId: "aa-09fcd08b-7f23-4f62-9fdb-c880eb492e24",

        containerId: "chat-container",

        theme: "light",

        position: "bottom-right",

        greeting: "Hi! How can I help you today?",

        environment: "draft"
      });

    };
  </script>

</body>
</html>
